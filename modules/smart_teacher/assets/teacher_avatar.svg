<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Body -->
  <rect x="140" y="280" width="120" height="180" rx="20" fill="#2c3e50"/>
  
  <!-- Tie -->
  <polygon points="200,280 185,320 200,360 215,320" fill="#e74c3c"/>
  
  <!-- Neck -->
  <rect x="180" y="250" width="40" height="40" fill="#fdbcb4"/>
  
  <!-- Head -->
  <ellipse cx="200" cy="200" rx="80" ry="90" fill="#fdbcb4"/>
  
  <!-- Hair -->
  <ellipse cx="200" cy="140" rx="85" ry="50" fill="#2c3e50"/>
  <rect x="115" y="140" width="30" height="60" rx="10" fill="#2c3e50"/>
  <rect x="255" y="140" width="30" height="60" rx="10" fill="#2c3e50"/>
  
  <!-- Eyes -->
  <g class="eyes">
    <ellipse cx="170" cy="200" rx="15" ry="18" fill="white"/>
    <ellipse cx="230" cy="200" rx="15" ry="18" fill="white"/>
    <ellipse cx="170" cy="200" rx="8" ry="10" fill="#2c3e50">
      <animate attributeName="cy" values="200;198;200" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="230" cy="200" rx="8" ry="10" fill="#2c3e50">
      <animate attributeName="cy" values="200;198;200" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Eyebrows -->
  <line x1="155" y1="175" x2="185" y2="178" stroke="#2c3e50" stroke-width="3" stroke-linecap="round">
    <animate attributeName="y1" values="175;172;175" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="215" y1="178" x2="245" y2="175" stroke="#2c3e50" stroke-width="3" stroke-linecap="round">
    <animate attributeName="y2" values="175;172;175" dur="4s" repeatCount="indefinite"/>
  </line>
  
  <!-- Nose -->
  <ellipse cx="200" cy="220" rx="5" ry="8" fill="#e8a090"/>
  
  <!-- Mouth - Animated -->
  <g class="mouth">
    <ellipse cx="200" cy="245" rx="15" ry="8" fill="#c0392b">
      <animate attributeName="ry" values="8;12;5;10;8" dur="0.5s" repeatCount="indefinite" begin="indefinite" id="mouthAnim"/>
    </ellipse>
  </g>
  
  <!-- Glasses -->
  <circle cx="170" cy="200" r="22" fill="none" stroke="#34495e" stroke-width="3"/>
  <circle cx="230" cy="200" r="22" fill="none" stroke="#34495e" stroke-width="3"/>
  <line x1="192" y1="200" x2="208" y2="200" stroke="#34495e" stroke-width="3"/>
  <line x1="148" y1="195" x2="130" y2="190" stroke="#34495e" stroke-width="3"/>
  <line x1="252" y1="195" x2="270" y2="190" stroke="#34495e" stroke-width="3"/>
  
  <!-- Left Arm - Pointing -->
  <g class="left-arm">
    <line x1="140" y1="300" x2="80" y2="350" stroke="#2c3e50" stroke-width="15" stroke-linecap="round">
      <animate attributeName="x2" values="80;85;80" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="350;345;350" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Hand -->
    <circle cx="80" cy="350" r="12" fill="#fdbcb4">
      <animate attributeName="cx" values="80;85;80" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="350;345;350" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Right Arm - Holding pointer -->
  <g class="right-arm">
    <line x1="260" y1="300" x2="340" y2="250" stroke="#2c3e50" stroke-width="15" stroke-linecap="round">
      <animate attributeName="x2" values="340;350;340" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="250;240;250" dur="3s" repeatCount="indefinite"/>
    </line>
    <!-- Hand with pointer -->
    <circle cx="340" cy="250" r="12" fill="#fdbcb4">
      <animate attributeName="cx" values="340;350;340" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="250;240;250" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Pointer stick -->
    <line x1="350" y1="245" x2="390" y2="220" stroke="#8B4513" stroke-width="4" stroke-linecap="round">
      <animate attributeName="x1" values="350;360;350" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="245;235;245" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Shoes -->
  <ellipse cx="170" cy="460" rx="25" ry="10" fill="#1a1a2e"/>
  <ellipse cx="230" cy="460" rx="25" ry="10" fill="#1a1a2e"/>
</svg>